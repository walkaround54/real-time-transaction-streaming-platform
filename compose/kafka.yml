services:
  init-permissions:
    image: apache/kafka:latest
    container_name: init-permissions
    user: root
    command: ["bash", "-lc", "chown -R 1000:1000 /tmp/kraft-combined-logs"]
    volumes:
      - broker-data:/tmp/kraft-combined-logs
    restart: "no"


  broker:
    image: apache/kafka:latest
    hostname: broker
    container_name: broker
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - broker-data:/tmp/kraft-combined-logs
      # volume name: path inside container

  init-topics:
    image: apache/kafka:latest
    container_name: init-topics
    depends_on:
      broker:
        condition: service_started
    entrypoint: ["/bin/bash", "-lc"]
    command: >
      "
      until /opt/kafka/bin/kafka-topics.sh --bootstrap-server broker:29092 --list >/dev/null 2>&1;
      do
        sleep 2;
      done;
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server broker:29092
      --create
      --if-not-exists
      --topic transactions_raw
      --partitions 1
      --replication-factor 1;
      /opt/kafka/bin/kafka-topics.sh
      --bootstrap-server broker:29092
      --create
      --if-not-exists
      --topic transactions_processed
      --partitions 1
      --replication-factor 1
      "
    # the "--bootstrap..."" etc. are flags for the shell script
    restart: "no"

volumes:
  broker-data: # named volume where kafka stores log and metadata files
  # volume and data survives container restarts
  # keeps broker state separate from container filesystem

networks:
  default:
    name: transaction-streaming-net
